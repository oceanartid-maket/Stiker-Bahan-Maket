<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanArt.Id - Tema Laut Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(to bottom, 
                #0a0e17 0%, 
                #0f1b2d 20%, 
                #14213d 40%, 
                #1a365d 60%, 
                #22577a 80%, 
                #2d5a8c 100%);
            min-height: 100vh;
            position: relative;
        }

        /* Efek air laut bergerak */
        .ocean-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(45,90,140,0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(26,54,93,0.5) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(20,33,61,0.3) 0%, transparent 50%);
            animation: oceanFlow 20s ease-in-out infinite;
        }

        @keyframes oceanFlow {
            0%, 100% { 
                transform: translateX(0) scale(1);
                opacity: 0.8;
            }
            33% { 
                transform: translateX(-10px) scale(1.05);
                opacity: 1;
            }
            66% { 
                transform: translateX(10px) scale(1.03);
                opacity: 0.9;
            }
        }

        /* Gelembung udara laut */
        .bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .bubble {
            position: absolute;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            animation: bubbleRise linear infinite;
        }

        @keyframes bubbleRise {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100px) scale(1) rotate(360deg);
                opacity: 0;
            }
        }

        /* Header Laut */
        .header {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #e2e8f0;
            z-index: 10;
            padding: 20px;
            min-height: 100vh;
        }

        .logo {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            color: #ffffff;
            margin-bottom: clamp(20px, 5vw, 30px);
            position: relative;
            line-height: 1.1;
        }

        .logo::after {
            content: '🌊';
            position: absolute;
            font-size: clamp(1.5rem, 4vw, 3rem);
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(45,90,140,0.8));
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-15px); }
        }

        .subtitle {
            font-size: clamp(1.2rem, 3vw, 1.7rem);
            font-weight: 400;
            margin-bottom: clamp(40px, 8vw, 60px);
            opacity: 0.95;
            max-width: 90%;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.7);
            background: rgba(255,255,255,0.08);
            padding: clamp(15px, 4vw, 25px) clamp(20px, 6vw, 40px);
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.12);
        }

        /* Tombol Tema Laut */
        .buttons {
            display: flex;
            gap: clamp(20px, 4vw, 40px);
            flex-wrap: wrap;
            justify-content: center;
            perspective: 1000px;
            width: 100%;
            max-width: 800px;
        }

        .btn {
            padding: clamp(18px, 3vw, 25px) clamp(35px, 8vw, 55px);
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            flex: 1;
            min-width: 280px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 25px 50px rgba(20,33,61,0.6);
            backdrop-filter: blur(20px);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            color: #e2e8f0;
            text-align: center;
            justify-content: center;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255,255,255,0.3), 
                rgba(255,255,255,0.5),
                transparent);
            transition: left 0.7s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-stiker {
            background: linear-gradient(145deg, 
                #1a365d, 
                #2d5a8c, 
                #22577a, 
                #1e3a5f);
            box-shadow: 0 30px 60px rgba(26,54,93,0.8);
        }

        .btn-maket {
            background: linear-gradient(145deg, 
                #0f1b2d, 
                #14213d, 
                #1a365d, 
                #22577a);
            box-shadow: 0 30px 60px rgba(20,33,61,0.8);
        }

        .btn:hover {
            transform: translateY(-15px) rotateX(15deg) scale(1.05);
            box-shadow: 0 40px 80px rgba(20,33,61,0.9);
        }

        /* Section Contact Tema Laut */
        .contact-section {
            background: linear-gradient(135deg, 
                rgba(10,14,23,0.98) 0%, 
                rgba(15,27,45,0.95) 50%, 
                rgba(20,33,61,0.92) 100%);
            padding: clamp(80px, 15vw, 140px) 20px clamp(60px, 12vw, 100px);
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        .contact-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 20%, rgba(34,87,122,0.3) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(26,54,93,0.25) 0%, transparent 50%);
            animation: deepOcean 15s ease-in-out infinite;
        }

        @keyframes deepOcean {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .contact-container {
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .contact-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            background: linear-gradient(45deg, #2d5a8c, #22577a, #1e3a5f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: clamp(40px, 8vw, 70px);
            font-weight: 800;
            text-shadow: 0 0 30px rgba(45,90,140,0.8);
            animation: titleWave 2s ease-in-out infinite;
        }

        @keyframes titleWave {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: clamp(30px, 6vw, 50px);
        }

        .contact-card {
            background: linear-gradient(145deg, 
                rgba(255,255,255,0.1), 
                rgba(255,255,255,0.04));
            backdrop-filter: blur(25px);
            border: 2px solid rgba(34,87,122,0.4);
            border-radius: 35px;
            padding: clamp(35px, 8vw, 50px) clamp(25px, 6vw, 35px);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #2d5a8c, #1e3a5f, #22577a, #2d5a8c);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .contact-card:hover {
            transform: translateY(-25px) scale(1.03);
            box-shadow: 0 50px 100px rgba(20,33,61,0.7);
            border-color: rgba(45,90,140,0.7);
        }

        .contact-avatar {
            width: clamp(80px, 15vw, 100px);
            height: clamp(80px, 15vw, 100px);
            background: linear-gradient(45deg, #2d5a8c, #1e3a5f);
            border-radius: 50%;
            margin: 0 auto clamp(15px, 4vw, 25px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 5vw, 3rem);
            box-shadow: 0 15px 40px rgba(45,90,140,0.7);
            border: 3px solid rgba(255,255,255,0.2);
        }

        .contact-name {
            font-size: clamp(1.4rem, 3.5vw, 1.8rem);
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: clamp(10px, 3vw, 20px);
            text-shadow: 0 2px 10px rgba(0,0,0,0.7);
        }

        .contact-phone {
            font-size: clamp(1.1rem, 2.8vw, 1.4rem);
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            margin-top: clamp(15px, 4vw, 25px);
            padding: clamp(15px, 3.5vw, 20px) clamp(25px, 6vw, 35px);
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            border: 2px solid rgba(34,87,122,0.5);
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            font-weight: 600;
        }

        .contact-phone:hover {
            background: rgba(45,90,140,0.3);
            border-color: #2d5a8c;
            color: #f1f5f9;
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 15px 35px rgba(45,90,140,0.5);
        }

        /* Scroll indicator tema laut */
        .scroll-indicator {
            position: absolute;
            bottom: clamp(20px, 5vw, 40px);
            left: 50%;
            transform: translateX(-50%);
            color: #94a3b8;
            font-size: clamp(1.5rem, 4vw, 2rem);
            animation: bubbleFloat 3s infinite;
            cursor: pointer;
        }

        @keyframes bubbleFloat {
            0%, 100% { transform: translateX(-50%) translateY(0px) scale(1); }
            50% { transform: translateX(-50%) translateY(-20px) scale(1.1); }
        }

        /* LAPTOP & DESKTOP */
        @media (min-width: 1024px) {
            .header { padding: 0 40px; }
            .btn { padding: 25px 55px; font-size: 1.5rem; }
        }

        /* TABLET */
        @media (max-width: 768px) {
            .header { height: 100vh; padding: 20px; }
            .buttons { flex-direction: column; align-items: center; gap: 25px; }
            .btn { 
                width: 100%; 
                max-width: 350px;
                padding: 22px 45px; 
                font-size: 1.3rem; 
            }
            .contact-grid { grid-template-columns: 1fr; gap: 30px; }
            .contact-section { padding: 80px 20px 60px; }
        }

        /* MOBILE */
        @media (max-width: 480px) {
            .header { padding: 15px; }
            .logo { font-size: 3.5rem; }
            .subtitle { 
                font-size: 1.2rem; 
                padding: 20px 25px; 
                margin-bottom: 40px;
            }
            .btn { 
                padding: 20px 35px; 
                font-size: 1.2rem; 
                min-width: 100%;
            }
            .contact-avatar { 
                width: 80px; 
                height: 80px; 
                font-size: 2.5rem;
            }
            .contact-name { font-size: 1.5rem; }
            .contact-phone { 
                font-size: 1.2rem; 
                padding: 15px 25px;
            }
            .contact-section { padding: 60px 15px 40px; }
            .contact-title { font-size: 2.5rem; margin-bottom: 40px; }
        }

        /* EXTRA SMALL MOBILE */
        @media (max-width: 360px) {
            .logo { font-size: 3rem; }
            .subtitle { font-size: 1.1rem; padding: 15px 20px; }
            .btn { padding: 18px 30px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <!-- Latar Laut -->
    <div class="ocean-bg"></div>
    
    <!-- Gelembung Udara -->

    <!-- Header -->

                       class="contact-phone" target="_blank">
                        0812-1640-9029
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Buat gelembung udara laut (kurangi di mobile untuk performa)
        function createBubbles() {
            const bubblesContainer = document.getElementById('bubbles');
            const bubbleCount = window.innerWidth > 768 ? 50 : 25;
            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.width = bubble.style.height = (Math.random() * 40 + 10) + 'px';
                bubble.style.animationDuration = (Math.random() * 10 + 8) + 's';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubblesContainer.appendChild(bubble);
            }
        }

        // Parallax untuk ocean background
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const oceanBg = document.querySelector('.ocean-bg');
            oceanBg.style.transform = `translateY(${scrolled * 0.3}px)`;
        });

        // Inisialisasi
        createBubbles();

        // Smooth scroll ke contact
        document.querySelector('.scroll-indicator').addEventListener('click', () => {
            document.querySelector('.contact-section').scrollIntoView({ 
                behavior: 'smooth' 
            });
        });

        // Handle window resize untuk bubbles
        window.addEventListener('resize', () => {
            document.getElementById('bubbles').innerHTML = '';
            createBubbles();
        });
    </script>
</body>
</html>
